<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT N5 日語學習平台</title>
<style>
:root {
  --primary: #e63946;
  --primary-dark: #c1121f;
  --bg: #f5f5f5;
  --card: #ffffff;
  --text: #333333;
  --text-light: #666666;
  --border: #e0e0e0;
  --accent: #457b9d;
  --success: #2a9d8f;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ── */
header {
  background: var(--primary);
  color: white;
  padding: 0 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
}
.logo { font-size: 1.3rem; font-weight: 700; }
.logo span {
  background: white;
  color: var(--primary);
  padding: 2px 8px;
  border-radius: 4px;
  margin-right: 8px;
  font-size: 0.85rem;
  font-weight: 800;
}
nav { display: flex; gap: 4px; }
nav button {
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.85);
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.9rem;
  transition: all 0.2s;
}
nav button:hover, nav button.active {
  background: rgba(255,255,255,0.2);
  color: white;
  font-weight: 600;
}

/* ── Main ── */
main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px 20px;
}

/* ── Pages ── */
.page { display: none; }
.page.active { display: block; }

/* ── Home ── */
.hero { text-align: center; padding: 48px 20px 32px; }
.hero h1 { font-size: 2.2rem; color: var(--primary); margin-bottom: 10px; }
.hero p { color: var(--text-light); font-size: 1.05rem; margin-bottom: 40px; }

.level-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 14px;
  max-width: 700px;
  margin: 0 auto;
}
.level-card {
  background: var(--card);
  border-radius: 12px;
  padding: 24px 12px;
  text-align: center;
  border: 2px solid var(--border);
  transition: all 0.2s;
  box-shadow: 0 2px 6px rgba(0,0,0,0.06);
}
.level-card.available { cursor: pointer; }
.level-card.available:hover {
  border-color: var(--primary);
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(230,57,70,0.15);
}
.level-card.locked { opacity: 0.55; cursor: not-allowed; }
.level-badge {
  font-size: 1.8rem;
  font-weight: 800;
  color: var(--primary);
  display: block;
  margin-bottom: 6px;
}
.level-name { font-size: 0.8rem; color: var(--text-light); }
.level-status {
  font-size: 0.72rem;
  padding: 3px 8px;
  border-radius: 20px;
  display: inline-block;
  margin-top: 8px;
}
.available .level-status { background: #e8f5e9; color: #2e7d32; }
.locked .level-status { background: #f5f5f5; color: #999; }

.stats-bar {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-top: 40px;
}
.stat-card {
  background: var(--card);
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.06);
}
.stat-num { font-size: 2rem; font-weight: 700; color: var(--primary); }
.stat-label { color: var(--text-light); font-size: 0.88rem; margin-top: 4px; }

/* ── Page Header ── */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
  flex-wrap: wrap;
  gap: 12px;
}
.page-header h2 { font-size: 1.4rem; }
.search-bar { display: flex; gap: 8px; flex-wrap: wrap; }
.search-bar input {
  padding: 8px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.9rem;
  width: 210px;
  outline: none;
  transition: border-color 0.2s;
}
.search-bar input:focus { border-color: var(--primary); }
.search-bar select {
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.9rem;
  background: white;
  cursor: pointer;
  outline: none;
}

/* ── Vocab Table ── */
.vocab-table-wrapper {
  background: var(--card);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.vocab-table { width: 100%; border-collapse: collapse; }
.vocab-table thead { background: var(--primary); color: white; }
.vocab-table th { padding: 12px 16px; text-align: left; font-weight: 600; font-size: 0.88rem; }
.vocab-table td { padding: 11px 16px; border-bottom: 1px solid var(--border); font-size: 0.93rem; }
.vocab-table tr:last-child td { border-bottom: none; }
.vocab-table tbody tr:hover td { background: #fff8f8; }
.kanji-text { font-size: 1.15rem; font-weight: 600; }
.kana-text { font-size: 0.8rem; color: var(--text-light); display: block; margin-top: 2px; }

.pos-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.75rem;
  font-weight: 500;
  white-space: nowrap;
}
.pos-動詞     { background:#e3f2fd; color:#1565c0; }
.pos-名詞     { background:#f3e5f5; color:#6a1b9a; }
.pos-い形容詞  { background:#e8f5e9; color:#2e7d32; }
.pos-な形容詞  { background:#fff3e0; color:#e65100; }
.pos-副詞     { background:#fce4ec; color:#880e4f; }
.pos-代名詞   { background:#fff8e1; color:#f57f17; }
.pos-表現     { background:#e8eaf6; color:#283593; }

.audio-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 9px;
  cursor: pointer;
  font-size: 0.95rem;
  transition: all 0.2s;
  color: var(--text-light);
}
.audio-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }

.vocab-info {
  font-size: 0.85rem;
  color: var(--text-light);
  margin-bottom: 10px;
}

/* ── Pagination ── */
.pagination { display: flex; justify-content: center; gap: 6px; margin-top: 18px; flex-wrap: wrap; }
.page-btn {
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: white;
  cursor: pointer;
  font-size: 0.88rem;
  transition: all 0.2s;
}
.page-btn:hover, .page-btn.active {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}

/* ── Grammar ── */
.grammar-list { display: flex; flex-direction: column; gap: 10px; }
.grammar-card {
  background: var(--card);
  border-radius: 12px;
  border: 1px solid var(--border);
  overflow: hidden;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  transition: box-shadow 0.2s;
}
.grammar-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
.grammar-header {
  display: flex;
  align-items: center;
  padding: 14px 20px;
  cursor: pointer;
  gap: 14px;
  user-select: none;
}
.grammar-pattern { font-size: 1.1rem; font-weight: 700; color: var(--primary); min-width: 170px; }
.grammar-meaning { color: var(--text); font-size: 0.93rem; flex: 1; }
.grammar-toggle { color: var(--text-light); transition: transform 0.25s; flex-shrink: 0; }
.grammar-card.open .grammar-toggle { transform: rotate(180deg); }
.grammar-body { display: none; padding: 0 20px 18px; border-top: 1px solid var(--border); }
.grammar-card.open .grammar-body { display: block; }
.grammar-usage {
  color: var(--text-light);
  font-size: 0.88rem;
  margin: 12px 0 8px;
  line-height: 1.6;
}
.example-box {
  background: #f8f9fa;
  border-left: 3px solid var(--primary);
  border-radius: 0 8px 8px 0;
  padding: 12px 16px;
  margin-top: 8px;
}
.example-jp { font-size: 1.05rem; font-weight: 600; }
.example-kana { font-size: 0.82rem; color: var(--text-light); margin-top: 2px; }
.example-zh { font-size: 0.88rem; color: var(--accent); margin-top: 4px; }
.grammar-audio {
  margin-top: 10px;
  font-size: 0.82rem;
  cursor: pointer;
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 12px;
  color: var(--text-light);
  transition: all 0.2s;
}
.grammar-audio:hover { background: var(--primary); color: white; border-color: var(--primary); }

/* ── Quiz ── */
.quiz-container { max-width: 680px; margin: 0 auto; }
.quiz-setup {
  background: var(--card);
  border-radius: 12px;
  padding: 36px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.quiz-setup h2 { font-size: 1.5rem; margin-bottom: 8px; }
.quiz-setup p { color: var(--text-light); margin-bottom: 24px; }
.quiz-type-grid {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 28px;
}
.qtype-btn {
  padding: 11px 22px;
  border: 2px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.9rem;
  background: white;
  transition: all 0.2s;
}
.qtype-btn:hover, .qtype-btn.selected {
  border-color: var(--primary);
  background: var(--primary);
  color: white;
}
.count-select { margin-bottom: 20px; }
.count-select label { font-size: 0.9rem; color: var(--text-light); margin-right: 8px; }
.count-select select {
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 0.9rem;
  outline: none;
}
.start-btn {
  background: var(--primary);
  color: white;
  border: none;
  padding: 13px 48px;
  border-radius: 8px;
  font-size: 1rem;
  cursor: pointer;
  transition: background 0.2s;
}
.start-btn:hover { background: var(--primary-dark); }

/* Quiz active */
.quiz-active { display: none; }
.quiz-active.show { display: block; }
.quiz-setup.hide { display: none; }
.quiz-top {
  display: flex;
  justify-content: space-between;
  font-size: 0.88rem;
  color: var(--text-light);
  margin-bottom: 10px;
}
.progress-bar { height: 6px; background: var(--border); border-radius: 3px; margin-bottom: 22px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width 0.4s; }
.quiz-question {
  background: var(--card);
  border-radius: 12px;
  padding: 32px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  margin-bottom: 14px;
}
.quiz-word { font-size: 2.4rem; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
.quiz-hint { font-size: 0.85rem; color: var(--text-light); }
.quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.opt-btn {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 10px;
  padding: 15px 18px;
  font-size: 0.93rem;
  cursor: pointer;
  text-align: left;
  transition: all 0.2s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  line-height: 1.4;
}
.opt-btn:hover:not(:disabled) { border-color: var(--primary); background: #fff5f5; }
.opt-btn.correct { border-color: var(--success); background: #e8f8f7; color: var(--success); }
.opt-btn.wrong { border-color: var(--primary); background: #fff0f1; color: var(--primary); }
.next-btn {
  width: 100%;
  background: var(--primary);
  color: white;
  border: none;
  padding: 13px;
  border-radius: 8px;
  font-size: 0.95rem;
  cursor: pointer;
  margin-top: 12px;
  display: none;
  transition: background 0.2s;
}
.next-btn.show { display: block; }
.next-btn:hover { background: var(--primary-dark); }

/* Results */
.quiz-results {
  background: var(--card);
  border-radius: 12px;
  padding: 40px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  display: none;
}
.quiz-results.show { display: block; }
.result-emoji { font-size: 3rem; }
.result-title { font-size: 1.4rem; font-weight: 700; margin-top: 10px; }
.result-score { font-size: 3.5rem; font-weight: 800; color: var(--primary); margin: 12px 0; }
.result-msg { color: var(--text-light); font-size: 1rem; margin-bottom: 24px; }
.result-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.retry-btn, .back-btn {
  padding: 11px 32px;
  border-radius: 8px;
  font-size: 0.95rem;
  cursor: pointer;
  transition: all 0.2s;
}
.retry-btn { background: var(--primary); color: white; border: none; }
.retry-btn:hover { background: var(--primary-dark); }
.back-btn { background: white; color: var(--text); border: 1px solid var(--border); }
.back-btn:hover { border-color: var(--primary); color: var(--primary); }

/* ── Responsive ── */
@media (max-width: 650px) {
  .header-inner { flex-wrap: wrap; height: auto; padding: 10px 0; gap: 8px; }
  nav button { padding: 6px 10px; font-size: 0.82rem; }
  .level-grid { grid-template-columns: repeat(3, 1fr); }
  .stats-bar { grid-template-columns: 1fr 1fr; }
  .quiz-options { grid-template-columns: 1fr; }
  .grammar-pattern { min-width: 120px; }
  .vocab-table th:nth-child(2), .vocab-table td:nth-child(2) { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo"><span>N5</span>日語學習平台</div>
    <nav>
      <button class="active" onclick="showPage('home')">🏠 首頁</button>
      <button onclick="showPage('vocab')">📖 單字</button>
      <button onclick="showPage('grammar')">📝 文法</button>
      <button onclick="showPage('quiz')">⚡ 測驗</button>
    </nav>
  </div>
</header>

<main>

  <!-- ===== 首頁 ===== -->
  <div id="page-home" class="page active">
    <div class="hero">
      <h1>🇯🇵 日語學習平台</h1>
      <p>從 N5 基礎開始，踏上學習日語的旅程！</p>
      <div class="level-grid">
        <div class="level-card available" onclick="showPage('vocab')">
          <span class="level-badge">N5</span>
          <div class="level-name">基礎入門</div>
          <span class="level-status">✓ 可使用</span>
        </div>
        <div class="level-card locked">
          <span class="level-badge">N4</span>
          <div class="level-name">初　　級</div>
          <span class="level-status">🔒 即將推出</span>
        </div>
        <div class="level-card locked">
          <span class="level-badge">N3</span>
          <div class="level-name">中　　級</div>
          <span class="level-status">🔒 即將推出</span>
        </div>
        <div class="level-card locked">
          <span class="level-badge">N2</span>
          <div class="level-name">中上　級</div>
          <span class="level-status">🔒 即將推出</span>
        </div>
        <div class="level-card locked">
          <span class="level-badge">N1</span>
          <div class="level-name">高　　級</div>
          <span class="level-status">🔒 即將推出</span>
        </div>
      </div>
    </div>
    <div class="stats-bar">
      <div class="stat-card"><div class="stat-num">220+</div><div class="stat-label">N5 單字</div></div>
      <div class="stat-card"><div class="stat-num">40</div><div class="stat-label">N5 文法句型</div></div>
      <div class="stat-card"><div class="stat-num">∞</div><div class="stat-label">隨機練習題</div></div>
    </div>
  </div>

  <!-- ===== 單字 ===== -->
  <div id="page-vocab" class="page">
    <div class="page-header">
      <h2>📖 N5 單字表</h2>
      <div class="search-bar">
        <input type="text" id="vocab-search" placeholder="搜尋單字 / 意思..." oninput="filterVocab()">
        <select id="pos-filter" onchange="filterVocab()">
          <option value="">所有詞性</option>
          <option value="動詞">動詞</option>
          <option value="名詞">名詞</option>
          <option value="い形容詞">い形容詞</option>
          <option value="な形容詞">な形容詞</option>
          <option value="副詞">副詞</option>
          <option value="代名詞">代名詞</option>
          <option value="表現">表現</option>
        </select>
      </div>
    </div>
    <div class="vocab-info" id="vocab-info"></div>
    <div class="vocab-table-wrapper">
      <table class="vocab-table">
        <thead>
          <tr>
            <th>單字</th>
            <th>詞性</th>
            <th>中文意思</th>
            <th>語音</th>
          </tr>
        </thead>
        <tbody id="vocab-tbody"></tbody>
      </table>
    </div>
    <div class="pagination" id="vocab-pagination"></div>
  </div>

  <!-- ===== 文法 ===== -->
  <div id="page-grammar" class="page">
    <div class="page-header">
      <h2>📝 N5 文法</h2>
      <div class="search-bar">
        <input type="text" id="grammar-search" placeholder="搜尋文法..." oninput="renderGrammar()">
      </div>
    </div>
    <div class="grammar-list" id="grammar-list"></div>
  </div>

  <!-- ===== 測驗 ===== -->
  <div id="page-quiz" class="page">
    <div class="quiz-container">

      <div class="quiz-setup" id="quiz-setup">
        <h2>⚡ 隨機測驗</h2>
        <p>選擇測驗類型，開始練習 N5 單字！</p>
        <div class="quiz-type-grid">
          <button class="qtype-btn selected" onclick="selectType('meaning',this)">看單字 → 選意思</button>
          <button class="qtype-btn" onclick="selectType('word',this)">看意思 → 選單字</button>
          <button class="qtype-btn" onclick="selectType('reading',this)">看漢字 → 選讀音</button>
        </div>
        <div class="count-select">
          <label>題數：</label>
          <select id="quiz-count-sel">
            <option value="10">10 題</option>
            <option value="20">20 題</option>
            <option value="30">30 題</option>
          </select>
        </div>
        <button class="start-btn" onclick="startQuiz()">開始測驗 →</button>
      </div>

      <div class="quiz-active" id="quiz-active">
        <div class="quiz-top">
          <span id="q-count">第 1 題 / 共 10 題</span>
          <span id="q-score">得分：0</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <div class="quiz-question">
          <div class="quiz-word" id="quiz-word"></div>
          <div class="quiz-hint" id="quiz-hint"></div>
        </div>
        <div class="quiz-options" id="quiz-options"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">下一題 →</button>
      </div>

      <div class="quiz-results" id="quiz-results">
        <div class="result-emoji" id="result-emoji">🎉</div>
        <div class="result-title">測驗完成！</div>
        <div class="result-score" id="result-score"></div>
        <div class="result-msg" id="result-msg"></div>
        <div class="result-btns">
          <button class="retry-btn" onclick="startQuiz()">再測一次</button>
          <button class="back-btn" onclick="resetQuiz()">回到設定</button>
        </div>
      </div>

    </div>
  </div>

</main>

<script>
// ═══════════════════════════════
//  單字資料
// ═══════════════════════════════
const vocabData = [
  // 代名詞
  {k:'私',r:'わたし',p:'代名詞',m:'我'},
  {k:'あなた',r:'あなた',p:'代名詞',m:'你'},
  {k:'彼',r:'かれ',p:'代名詞',m:'他；男朋友'},
  {k:'彼女',r:'かのじょ',p:'代名詞',m:'她；女朋友'},
  {k:'みんな',r:'みんな',p:'代名詞',m:'大家；所有人'},
  {k:'これ',r:'これ',p:'代名詞',m:'這個（靠近說話者）'},
  {k:'それ',r:'それ',p:'代名詞',m:'那個（靠近對方）'},
  {k:'あれ',r:'あれ',p:'代名詞',m:'那個（遠離雙方）'},
  {k:'どれ',r:'どれ',p:'代名詞',m:'哪一個'},
  {k:'ここ',r:'ここ',p:'代名詞',m:'這裡'},
  {k:'そこ',r:'そこ',p:'代名詞',m:'那裡（靠近對方）'},
  {k:'あそこ',r:'あそこ',p:'代名詞',m:'那裡（遠離雙方）'},

function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  const pages = ['home','vocab','grammar','quiz'];
  document.querySelectorAll('nav button')[pages.indexOf(page)].classList.add('active');
  if (page === 'vocab') renderVocab();
  if (page === 'grammar') renderGrammar();
}

// ═══════════════════════════════
//  Audio (Web Speech API)
// ═══════════════════════════════
function speak(text) {
  if (!('speechSynthesis' in window)) { alert('您的瀏覽器不支援語音功能，建議使用 Chrome 瀏覽器'); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP';
  u.rate = 0.85;
  u.pitch = 1.0;
  // 等待聲音載入
  const doSpeak = () => {
    const voices = speechSynthesis.getVoices();
    const jaVoice = voices.find(v => v.lang === 'ja-JP' || v.lang.startsWith('ja'));
    if (jaVoice) u.voice = jaVoice;
    window.speechSynthesis.speak(u);
  };
  if (speechSynthesis.getVoices().length > 0) { doSpeak(); }
  else { speechSynthesis.onvoiceschanged = doSpeak; }
}

//  Vocabulary
// ═══════════════════════════════
function renderVocab() {
  const tbody = document.getElementById('vocab-tbody');
  const start = (vocabPage - 1) * PER_PAGE;
  const slice = filteredVocab.slice(start, start + PER_PAGE);

  document.getElementById('vocab-info').textContent =
    `共 ${filteredVocab.length} 筆，第 ${start + 1}–${Math.min(start + PER_PAGE, filteredVocab.length)} 筆`;

  tbody.innerHTML = slice.map(w => {
    const safeR = w.r.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<tr>
      <td>
        <span class="kanji-text">${w.k}</span>
        <span class="kana-text">${w.r}</span>
      </td>
      <td><span class="pos-badge pos-${w.p}">${w.p}</span></td>
      <td>${w.m}</td>
      <td><button class="audio-btn" onclick="speak('${safeR}')" title="朗讀">🔊</button></td>
    </tr>`;
  }).join('');

  renderPagination();
}

function filterVocab() {
  const s = document.getElementById('vocab-search').value.toLowerCase();
  const pos = document.getElementById('pos-filter').value;
  filteredVocab = vocabData.filter(w => {
    const ms = !s || w.k.includes(s) || w.r.includes(s) || w.m.includes(s);
    const mp = !pos || w.p === pos;
    return ms && mp;
  });
  vocabPage = 1;
  renderVocab();
}

function renderPagination() {
  const total = Math.ceil(filteredVocab.length / PER_PAGE);
  document.getElementById('vocab-pagination').innerHTML =
    Array.from({length: total}, (_,i) => i+1)
      .map(i => `<button class="page-btn ${i===vocabPage?'active':''}" onclick="goPage(${i})">${i}</button>`)
      .join('');
}

function goPage(n) { vocabPage = n; renderVocab(); window.scrollTo(0,0); }

function renderGrammar() {
  const s = (document.getElementById('grammar-search').value || '').toLowerCase();
  const data = grammarData.filter(g =>
    !s || g.pt.toLowerCase().includes(s) || g.mn.includes(s) || g.us.includes(s)
  );
  document.getElementById('grammar-list').innerHTML = data.map((g, i) => {
    const safeEx = g.ex.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<div class="grammar-card" id="gc${i}">
      <div class="grammar-header" onclick="toggleG('gc${i}')">
        <div class="grammar-pattern">${g.pt}</div>
        <div class="grammar-meaning">${g.mn}</div>
        <div class="grammar-toggle">▼</div>
      </div>
      <div class="grammar-body">
        <div class="grammar-usage">${g.us}</div>
        <div class="example-box">
          <div class="example-jp">${g.ex}</div>
          <div class="example-kana">${g.ek}</div>
          <div class="example-zh">${g.ez}</div>
        </div>
        <button class="grammar-audio" onclick="speak('${safeEx}')">🔊 朗讀例句</button>
      </div>

}

// ═══════════════════════════════
//  Quiz
// ═══════════════════════════════
function selectType(type, btn) {
  quizType = type;
  document.querySelectorAll('.qtype-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function startQuiz() {
  totalQ = parseInt(document.getElementById('quiz-count-sel').value);
  const pool = [...vocabData].sort(() => Math.random() - 0.5).slice(0, totalQ);
  quizQ = pool.map(word => {
    const wrongs = vocabData.filter(w => w !== word).sort(() => Math.random() - 0.5).slice(0, 3);
    let question, answer, opts;
    if (quizType === 'meaning') {
      question = word.k; answer = word.m;
      opts = [word, ...wrongs].sort(() => Math.random() - 0.5).map(w => ({label: w.m, val: w.m}));
    } else if (quizType === 'word') {
      question = word.m; answer = word.k;
      opts = [word, ...wrongs].sort(() => Math.random() - 0.5).map(w => ({label: w.k, val: w.k}));
    } else {
      question = word.k; answer = word.r;
      opts = [word, ...wrongs].sort(() => Math.random() - 0.5).map(w => ({label: w.r, val: w.r}));
    }
    return {question, answer, opts, word};
  });
  qIdx = 0; qScore = 0;
  document.getElementById('quiz-setup').classList.add('hide');
  document.getElementById('quiz-active').classList.add('show');
  document.getElementById('quiz-results').classList.remove('show');
  showQ();
}

function showQ() {
  const q = quizQ[qIdx];
  document.getElementById('q-count').textContent = `第 ${qIdx+1} 題 / 共 ${totalQ} 題`;
  document.getElementById('q-score').textContent = `得分：${qScore}`;
  document.getElementById('progress-fill').style.width = `${(qIdx/totalQ)*100}%`;
  const hints = {meaning:'選出正確的中文意思', word:'選出正確的日文單字', reading:'選出正確的假名讀音'};
  document.getElementById('quiz-word').textContent = q.question;
  document.getElementById('quiz-hint').textContent = hints[quizType];
  document.getElementById('quiz-options').innerHTML = q.opts.map(opt => {
    const safeVal = opt.val.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<button class="opt-btn" onclick="checkAns(this,'${safeVal}')">${opt.label}</button>`;
  }).join('');
  document.getElementById('next-btn').classList.remove('show');
}

function checkAns(btn, selected) {
  const q = quizQ[qIdx];
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  if (selected === q.answer) {
    btn.classList.add('correct'); qScore++;
    speak(q.word.r);
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.opt-btn').forEach(b => {
      if (b.textContent.trim() === q.answer) b.classList.add('correct');
    });
  }
  document.getElementById('q-score').textContent = `得分：${qScore}`;
  document.getElementById('next-btn').classList.add('show');
}

function nextQuestion() {
  qIdx++;
  if (qIdx >= totalQ) showResults();
  else showQ();
}

function showResults() {
  document.getElementById('quiz-active').classList.remove('show');
  document.getElementById('quiz-results').classList.add('show');
  document.getElementById('progress-fill').style.width = '100%';
  const pct = Math.round(qScore / totalQ * 100);
  document.getElementById('result-score').textContent = `${qScore} / ${totalQ}`;
  const msgs = [
    [90,'🏆','太厲害了！幾乎全對！繼續保持！'],
    [70,'👍','不錯喔！再加把勁就可以了！'],
    [50,'📚','還有進步空間，多複習再來挑戰！'],
    [0, '💪','別灰心，多練習就會進步！'],
  ];
  const [,emoji, msg] = msgs.find(([t]) => pct >= t);
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-msg').textContent = msg;
}

function resetQuiz() {
  document.getElementById('quiz-setup').classList.remove('hide');
  document.getElementById('quiz-active').classList.remove('show');
  document.getElementById('quiz-results').classList.remove('show');
  document.getElementById('progress-fill').style.width = '0%';
}

// ═══════════════════════════════
//  Init
// ═══════════════════════════════
renderVocab();
renderGrammar();
</script>
